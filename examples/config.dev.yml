# Dev config — points at localhost upstreams + local fixtures.
# The cert files referenced here do not exist yet; build step 4 ships
# scripts/dev-certs.sh which generates them. Until then, this file is
# valid for schema-loading purposes; mTLS won't actually start.
#
# Run: dprox serve --config examples/config.dev.yml

org: dev

server:
  bind: "127.0.0.1:8000"
  request_timeout_seconds: 30
  max_request_body_bytes: 65536

mtls:
  ca_cert_path: ./certs/ca.crt
  server_cert_path: ./certs/server.crt
  server_key_path: ./certs/server.key
  client_cert_mode: optional
  cn_to_agent_strategy: cn_equals_name
  tls_min_version: "TLSv1.3"
  tls_pin_enabled: true

plan:
  compiled_plan_path: ./.compiled/compiled_plan.yml
  cache_enabled: true
  reload_on_mtime_change: true
  reload_on_unknown_cn: true
  reload_min_interval_seconds: 5

embedding:
  endpoint: http://localhost:11434
  model: nomic-embed-text
  vector_dim: 768
  timeout_seconds: 10

qdrant:
  url: http://localhost:6333
  api_key_env: QDRANT_RO_API_KEY
  collection: documents
  default_limit: 10
  max_limit: 50
  timeout_seconds: 10

logging:
  level: DEBUG
  format: console
  log_query_text: true
